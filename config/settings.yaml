market: cn
default_symbol: "000001.SZ"
initial_cash: 1000000

backtest:
  start_date: "20230101"      # 回测开始日期 (YYYYMMDD)，为空则使用 days 参数
  end_date: "20231231"        # 回测结束日期 (YYYYMMDD)
  commission: 0.0003           # 交易佣金 (0.03%)
  stop_loss: 0.0              # 止损比例 (0.05 = 5%)，0 表示禁用
  position_size: 1.0          # 仓位比例 0.0~1.0 (1.0 = 全仓)
  days: 250                   # 默认回测天数

data:
  fetch_interval: 60          # 实时监控轮询间隔 (秒)
