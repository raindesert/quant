# market: cn  # TODO: 未使用，待移除或实现
default_symbol: "000001.SZ"
initial_cash: 1000000

backtest:
  commission: 0.0003
  stamp_tax: 0.001
  min_commission: 5.0
  stop_loss: 0.0
  take_profit: 0.0
  position_size: 1.0
  days: 250
  slippage: 0.001
  slippage_type: percent
  enforce_t_plus_1: true
  check_limit: true

risk:
  enabled: true
  max_position_pct: 0.25
  max_positions: 10
  max_drawdown_pct: 0.20
  max_daily_loss_pct: 0.03
  max_stock_loss_pct: 0.10

walk_forward:
  train_days: 120
  test_days: 60
  step_days: 60
  overfit_threshold: 0.5

data:
  fetch_interval: 60
  use_local_cache: true
